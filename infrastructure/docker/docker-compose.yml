version: '3.8'

# ============================================
# ClipAI - Local Development Infrastructure
# ============================================
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f [service]
# ============================================

services:
  # ─────────────────────────────────────────
  # Redis - Job Queue (BullMQ)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clipai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────
  # MinIO - S3-Compatible Object Storage
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: clipai-minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: clipai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/clip-app-videos;
      mc anonymous set download local/clip-app-videos;
      echo 'Bucket created and configured.';
      exit 0;
      "

  # ─────────────────────────────────────────
  # PostgreSQL - Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clipai-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: clipai
      POSTGRES_PASSWORD: clipai
      POSTGRES_DB: clipai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipai -d clipai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────
  # BullMQ Board - Queue Dashboard UI
  # ─────────────────────────────────────────
  bull-board:
    image: deadly0/bull-board:latest
    container_name: clipai-bull-board
    ports:
      - "3100:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local
  postgres_data:
    driver: local
